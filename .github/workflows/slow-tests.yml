# The stress/race tests, kept out of the per-push run on purpose.
#
# They provoke races rather than asserting fixed input/output, so they cost ~20s
# and a pass is evidence rather than proof — the seq-gap test caught its
# regression in 3 of 4 runs when measured. Gating every push on a check that
# probabilistic would teach you to re-run red builds, which is exactly the habit
# that makes a suite worthless.
#
# So they run nightly and on demand instead. A failure here is worth
# investigating; a pass is mild reassurance, not a guarantee.
#
# Note: GitHub disables scheduled workflows in repos with no activity for 60
# days. If this stops firing, that's why — push anything, or re-enable it in the
# Actions tab.
name: Slow tests

on:
  schedule:
    # 04:00 UTC daily.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  race:
    name: Race/stress tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wnotes
          POSTGRES_PASSWORD: wnotes
          POSTGRES_DB: wnotes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wnotes"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://wnotes:wnotes@localhost:5432/wnotes_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run slow tests
        run: pytest -q -m slow
