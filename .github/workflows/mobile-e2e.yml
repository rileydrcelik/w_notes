# Runs the Maestro flows against a real Android emulator.
#
# These are the only tests in the repo that launch the app, and the only ones
# that touch expo-sqlite's *native* module rather than the wa-sqlite/OPFS build
# the Playwright suite covers — the two have failed differently before.
#
# Kept out of `tests.yml` because it costs an order of magnitude more than the
# suites there: it builds a release APK and boots an emulator. The two things
# that made this impractical to automate are both handled below — Gradle build
# caching for the build, AVD snapshot caching for the boot. Expect the first run
# on a fresh cache to be slow; judge this on run 2 onward.
name: Mobile E2E

on:
  push:
    branches: [main]
    paths:
      - 'notes-app/**'
      - '.github/workflows/mobile-e2e.yml'
  # Path-filtered, unlike tests.yml: a backend- or terraform-only PR cannot
  # break a mobile flow, and shouldn't wait ten minutes to prove it.
  pull_request:
    paths:
      - 'notes-app/**'
      - '.github/workflows/mobile-e2e.yml'
  workflow_dispatch:

concurrency:
  group: mobile-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android E2E (maestro)
    runs-on: ubuntu-latest
    # Generous, because it has to cover the cold-cache case. A warm run should
    # land far inside this; if warm runs start approaching it, something is
    # wrong with the caching rather than with the timeout.
    timeout-minutes: 45

    env:
      API_LEVEL: '34'
      # ATD ("automated test device") images are stripped of the apps and
      # services a human would need, and boot substantially faster. The
      # google_apis variant keeps Play Services, which matters because
      # @react-native-google-signin/google-signin is a native module — the flows
      # never sign in, but the module still initialises at launch.
      EMULATOR_TARGET: google_apis_atd
      EMULATOR_ARCH: x86_64

    steps:
      - uses: actions/checkout@v5

      # Without KVM the emulator falls back to software virtualisation and is
      # slow enough to blow the job timeout. This is the single highest-leverage
      # line in the file.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: notes-app/package-lock.json

      # Needed twice over: Gradle runs on it, and Maestro is itself a JVM tool.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Caches both the dependency cache and the Gradle build cache across runs.
      # This is what turns an 18-minute build into a few minutes for a PR that
      # only touches JS — the native compile is reused and only the bundle and
      # dex genuinely re-run.
      - uses: gradle/actions/setup-gradle@v4

      - name: Install
        working-directory: notes-app
        run: npm ci

      # Builds without installing — there is no device attached at this point.
      # Owns the env that pins sync off; see the script for why that matters.
      - name: Build release APK
        working-directory: notes-app
        # Scoped separately from the job timeout: a Gradle daemon that OOMs
        # doesn't exit, it wedges. Without a bound here that shows up as the
        # whole job dying at its own timeout with no indication of which step
        # was at fault — which is exactly how the first run of this failed.
        timeout-minutes: 25
        run: node scripts/build-android-e2e.mjs

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Booting a fresh AVD costs several minutes. Booting one from a snapshot
      # costs seconds, so the snapshot is built once and cached. Bump the -v1
      # suffix to force a rebuild if a snapshot ever goes stale — that failure
      # mode shows up as flows failing on a device in an odd state, not as a
      # cache error, so it is worth knowing the escape hatch exists.
      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-${{ env.EMULATOR_TARGET }}-${{ env.EMULATOR_ARCH }}-v1

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: ${{ env.EMULATOR_TARGET }}
          arch: ${{ env.EMULATOR_ARCH }}
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "snapshot generated"

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: ${{ env.EMULATOR_TARGET }}
          arch: ${{ env.EMULATOR_ARCH }}
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          # Animations make Maestro's waits flaky for no benefit here.
          disable-animations: true
          working-directory: notes-app
          script: |
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            # A notification shade left open covers the app and reads as a
            # baffling "element not visible" failure. Best-effort.
            adb shell cmd statusbar collapse || true
            maestro test --format junit --output maestro-report.xml .maestro/

      # Maestro writes its screenshots and per-step logs under ~/.maestro, which
      # is outside the workspace. Collecting them into the workspace first keeps
      # the upload to a single root — mixing an absolute path with a
      # workspace-relative one makes upload-artifact reduce them to their common
      # ancestor and produce a confusingly flattened archive.
      - name: Collect Maestro artifacts
        if: failure()
        run: |
          mkdir -p maestro-artifacts
          cp -r "$HOME/.maestro/tests" maestro-artifacts/ 2>/dev/null || true
          cp notes-app/maestro-report.xml maestro-artifacts/ 2>/dev/null || true

      # Screenshots and per-step logs for whatever failed — the difference
      # between debugging a CI failure and trying to reproduce it on a device.
      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: maestro-artifacts/
          retention-days: 7
          # A run that failed before Maestro produced anything is a real
          # outcome, not a reason to red-flag the upload step as well.
          if-no-files-found: ignore
