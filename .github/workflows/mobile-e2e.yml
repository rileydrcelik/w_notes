# Mobile E2E (Maestro on an Android emulator).
#
# Separate from tests.yml on purpose. This job is measured in tens of minutes —
# a native Gradle build plus an emulator boot — against ~1m20s for the whole fast
# pipeline. Folding it in would trade a feedback loop you can wait on for one you
# can't, on every push, including backend- and docs-only commits.
#
# So it runs only when something native-relevant changes, or when you ask for it.
# Everything else is already covered on every push by tests.yml — including the
# `.web`/`.native` export-parity check, which is the cheap guard for the bug
# class that motivated mobile E2E in the first place.
name: Mobile E2E

on:
  workflow_dispatch:

  # Only pushes that touch native-relevant code. Everything else is covered on
  # every push by tests.yml in ~1m20s, including the `.web`/`.native` export
  # parity check — the cheap guard for the bug class that motivated this.
  #
  # No nightly: a run costs tens of minutes and would re-verify code that mostly
  # hasn't changed natively, producing a result nobody reads unless it's red.
  push:
    paths:
      - 'notes-app/src/lib/db.ts'
      - 'notes-app/src/**/*.native.ts'
      - 'notes-app/src/**/*.native.tsx'
      - 'notes-app/android/**'
      - 'notes-app/package.json'
      - 'notes-app/.maestro/**'
      - '.github/workflows/mobile-e2e.yml'

concurrency:
  group: mobile-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (maestro)
    runs-on: ubuntu-latest
    # A cold native build on a 2-core runner took >44 min and hit a 45-min
    # timeout before the emulator even started. `setup-gradle` caches the build,
    # but the cache only exists once a run completes — so this generous ceiling
    # is there to let the *first* run through and populate it. If cached runs
    # don't come in comfortably under ~20 min, this workflow isn't worth keeping;
    # `npm run test:mobile` covers the same flows locally in about a minute.
    timeout-minutes: 90
    defaults:
      run:
        working-directory: notes-app

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: notes-app/package-lock.json

      # Gradle needs a JDK; 21 matches what the local builds used.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      # `android/` is gitignored — Expo generates it. A local checkout has one
      # because `expo run:android` prebuilds implicitly; CI has to ask.
      # APP_VARIANT is unset, so app.config.js yields the development variant and
      # the package id matches the flows' `com.rileydrcelik.wnotes.dev`.
      - name: Generate the native project
        run: npx expo prebuild --platform android --no-install

      # Built before the emulator starts: assembling the APK needs no device, and
      # keeping it out of the emulator step means the emulator is only alive for
      # the part that actually needs it.
      - name: Build release APK
        working-directory: notes-app/android
        env:
          # Release builds try to upload source maps and fail without a token.
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          # Sync off, matching the web E2E config: no backend, no Firebase, no
          # sign-in, and no test run creating junk users in production.
          EXPO_PUBLIC_API_URL: ''
          EXPO_PUBLIC_SENTRY_DSN: ''
        run: ./gradlew assembleRelease --no-daemon

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Hardware acceleration. Without KVM the emulator falls back to software
      # emulation and takes long enough to hit the job timeout.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: notes-app
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            adb shell cmd statusbar collapse || true
            maestro test .maestro/

      # Screenshots and view hierarchies for whatever failed — the difference
      # between reading a CI failure and trying to reproduce it on a device.
      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests/
          retention-days: 7
