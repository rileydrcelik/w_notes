# Runs the test suites on every push and pull request.
#
# This is the point where the suites stop being something you remember to run
# and start being something that runs itself. Two jobs, in parallel, both fast:
# the backend integration tests against a real Postgres, and the client unit
# tests in Node.
#
# The slow/race tests are deliberately NOT here — see the `slow-tests` workflow.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  # Lets you trigger a run by hand from the Actions tab.
  workflow_dispatch:

# A new push to the same branch cancels the run already in flight; there's no
# value in finishing CI for a commit that's already been superseded.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # The sync endpoints need real Postgres (ON CONFLICT, nextval, advisory
    # locks), so CI runs one as a service container rather than faking it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wnotes
          POSTGRES_PASSWORD: wnotes
          POSTGRES_DB: wnotes
        ports:
          - 5432:5432
        # Without the health check the job can start querying before Postgres is
        # accepting connections, which fails as a confusing connection error.
        options: >-
          --health-cmd "pg_isready -U wnotes"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # 5432 here, not the 5433 used locally: the service container has the port
      # to itself, so there's no local Postgres to avoid colliding with.
      TEST_DATABASE_URL: postgresql+asyncpg://wnotes:wnotes@localhost:5432/wnotes_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          # Matches the Dockerfile's python:3.12-slim. CI should mirror what
          # ships, not whatever happens to be on a developer's machine.
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      # Kept as a separate step rather than folded into the run above, so a
      # failure says at a glance whether a deterministic contract test broke or
      # a probabilistic race test did — they warrant very different reactions.
      # Running them per-push rather than nightly is deliberate: pushes here are
      # about daily anyway, so the cadence is the same, but a per-push failure
      # is attributable to one commit instead of to a day's worth. And since the
      # seq-gap test catches its regression ~3 runs in 4, repeated runs compound
      # (1 - 0.25^n) — more runs is strictly better detection.
      - name: Run slow tests
        run: pytest -q -m slow

  web:
    name: Client (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notes-app

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: notes-app/package-lock.json

      # `npm ci` installs exactly what package-lock.json pins and fails if the
      # lockfile is out of sync — stricter than `npm install`, which is what you
      # want in CI.
      - name: Install
        run: npm ci

      - name: Run tests
        run: npm test
