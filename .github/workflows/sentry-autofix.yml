# Sentry autofix — runs the Claude Code Action when the w_notes backend fires a
# `repository_dispatch` (event_type: sentry-autofix). Claude reads the Sentry
# error context from client_payload, applies a minimal fix, commits to a fixed
# `autofixes/issue-*` branch, and opens a PR to main. This workflow never merges
# — but in this repo `autofix-ship.yml` picks the PR up once Tests goes green and
# merges + deploys it automatically. Delete that file to return to review-first.
#
# This repo (rileydrcelik/w_notes) is the autofix target, so the workflow lives
# here. Requires an ANTHROPIC_API_KEY repo secret and, in Settings → Actions →
# General → Workflow permissions, "Allow GitHub Actions to create and approve
# pull requests" enabled (the built-in token can't open PRs otherwise).
# The canonical copy (for adding autofix to OTHER repos later) is in
# backend/docs/autofix/.

name: Sentry autofix

on:
  repository_dispatch:
    types: [sentry-autofix]

# Least privilege: write code (branch/commit) and open PRs. No merge permission.
permissions:
  contents: write
  pull-requests: write

# One run per issue branch; a repeat dispatch cancels the stale run rather than
# racing it. Also caps token spend from accidental double-taps.
concurrency:
  group: sentry-autofix-${{ github.event.client_payload.branch }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # AUTOFIX_PAT, not GITHUB_TOKEN. A PR opened by github-actions[bot] is
      # treated as coming from a first-time contributor, so its `pull_request`
      # workflows sit unrun awaiting maintainer approval — and approving one does
      # NOT emit a second `workflow_run: completed` event, so autofix-ship never
      # sees it. The fix has to be upstream of the gate: authoring as a real
      # contributor means Tests just runs.
      #
      # Loosening the repo's approval setting would also work, but this repo is
      # public: that would auto-run workflows for every stranger's PR, and a
      # poisoned Actions cache from one of them would later be restored by a
      # main-branch run that does hold secrets and does deploy. A PAT unblocks
      # only our own automation.
      #
      # Falls back to GITHUB_TOKEN when the secret is absent, so a fork of this
      # repo still gets a working (if gated) autofix rather than a broken one.
      - name: Claude autofix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          base_branch: main
          # Cost tiering: default to Haiku 4.5 (cheapest — most Sentry bugs are
          # trivial, and every fix is PR-reviewed so a weak attempt just gets
          # rejected). The backend can override per-issue via
          # client_payload.details.model ("Sonnet on demand" for hard fixes); that
          # path deliberately keeps Claude Code's default (capable) effort, since it
          # only runs when Haiku wasn't enough. --max-turns is the runaway guard — a
          # stuck run otherwise burns money for no PR. (A hard $ cap via
          # --max-budget-usd is a further option once verified against this action's
          # bundled CLI version.)
          # NB: do NOT add --effort — Haiku 4.5 rejects the effort parameter.
          claude_args: |
            --allowedTools Edit,Read,Write,Bash
            --model ${{ github.event.client_payload.details.model || 'claude-haiku-4-5' }}
            --max-turns 50
          prompt: |
            A production error was reported by Sentry. Fix its root cause in this repository.

            Work on a branch named EXACTLY this — create it from `main`, commit only there,
            and open a pull request from it into `main`. Do NOT merge, and do NOT push to main:
              BRANCH: ${{ github.event.client_payload.branch }}

            The pull request title should start with "Autofix:" and reference the Sentry issue
            ${{ github.event.client_payload.short_id }}. In the PR body, summarize the root cause
            and the fix, and link the Sentry issue: ${{ github.event.client_payload.permalink }}

            The stack frames in the payload below point at the code involved — start there.
            Make the smallest fix that addresses the root cause; keep it minimal. Don't explore
            or change files beyond the implicated ones unless the fix genuinely requires it. If
            you cannot confidently identify a fix from the context below, open the PR anyway with
            your analysis and a proposed direction rather than guessing broadly.

            --- Sentry issue ---
            Issue: ${{ github.event.client_payload.short_id }} — ${{ github.event.client_payload.title }}
            Level: ${{ github.event.client_payload.level }}
            Culprit: ${{ github.event.client_payload.culprit }}
            Exception: ${{ github.event.client_payload.exception_type }}: ${{ github.event.client_payload.exception_value }}
            Sentry link: ${{ github.event.client_payload.permalink }}

            Stack frames (in-app, nearest the crash first) and request/breadcrumb context are in
            this JSON payload:
            ${{ toJSON(github.event.client_payload) }}

      # The action pushes the fix branch but, on a repository_dispatch trigger,
      # doesn't reliably open the PR itself (no comment thread to open it from).
      # This guarantees a PR exists whenever the branch has commits — idempotent,
      # so it's a no-op if the action already opened one. Still PR-only, no merge.
      - name: Ensure pull request
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.client_payload.branch }}
          SHORT_ID: ${{ github.event.client_payload.short_id }}
          PERMALINK: ${{ github.event.client_payload.permalink }}
        run: |
          set -euo pipefail
          if ! git fetch origin "$BRANCH"; then
            echo "No branch $BRANCH was pushed — nothing to open a PR for."
            exit 0
          fi
          commits=$(git rev-list --count "origin/main..origin/$BRANCH")
          if [ "$commits" -eq 0 ]; then
            echo "Branch $BRANCH has no commits over main — no fix to propose."
            exit 0
          fi
          if [ -n "$(gh pr list --head "$BRANCH" --state all --json number --jq '.[].number')" ]; then
            echo "A pull request for $BRANCH already exists."
            exit 0
          fi
          gh pr create --head "$BRANCH" --base main \
            --title "Autofix: $SHORT_ID" \
            --body "Automated fix for Sentry issue $SHORT_ID. See $PERMALINK"

      # The `autofix` label is what marks a PR as machine-authored and therefore
      # eligible for automatic merge. It matters more now that the PAT makes
      # these PRs look like the repo owner's own: without an explicit marker,
      # autofix-ship could not tell an agent's PR from a hand-written one that
      # happened to sit on an `autofixes/*` branch. Applied to whichever PR
      # exists, since the action sometimes opens it and sometimes this job does.
      - name: Label the pull request
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          set -euo pipefail
          number=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$number" ]; then
            echo "No open PR for $BRANCH to label."
            exit 0
          fi
          gh pr edit "$number" --add-label autofix
          echo "Labelled PR #$number as autofix."

      # Once a PR exists for the fix, mark the Sentry issue resolved so it drops
      # out of the unresolved list. If the error recurs, Sentry auto-reopens it on
      # regression. Needs a SENTRY_API_TOKEN repo secret (event:write scope);
      # skipped quietly if it's absent. Swap "resolved" for "resolvedInNextRelease"
      # if you'd rather tie it to a release.
      - name: Resolve Sentry issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          SENTRY_API_TOKEN: ${{ secrets.SENTRY_API_TOKEN }}
          BRANCH: ${{ github.event.client_payload.branch }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_API_TOKEN:-}" ]; then
            echo "No SENTRY_API_TOKEN secret set — leaving the Sentry issue unresolved."
            exit 0
          fi
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "No open PR for $BRANCH — not resolving the Sentry issue."
            exit 0
          fi
          echo "Resolving Sentry issue $ISSUE_ID"
          code=$(curl -sS -X PUT "https://sentry.io/api/0/issues/$ISSUE_ID/" \
            -H "Authorization: Bearer $SENTRY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"resolved"}' -o /dev/null -w "%{http_code}")
          echo "Sentry responded $code"
          # Don't fail the run if Sentry rejects it — the PR is the important part.
          if [ "$code" -ge 400 ]; then echo "::warning::Sentry resolve returned $code"; fi
